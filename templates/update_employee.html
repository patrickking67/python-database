{% extends 'base.html' %}
{% block title %}Update {{ employee.name }} · PeopleBase{% endblock %}
{% block content %}
<section class="form-layout">
    <header><p class="eyebrow">Record {{ employee.id }}</p><h1>Update employee.</h1><p>Keep the directory accurate and current.</p></header>
    <form method="post" action="{{ url_for('update_employee', employee_id=employee.id) }}">
        <label for="name">Full name</label>
        <input type="text" name="name" id="name" value="{{ values.get('name', employee.name) }}" maxlength="100" autocomplete="name" required>
        <label for="position">Position</label>
        <input type="text" name="position" id="position" value="{{ values.get('position', employee.position) }}" maxlength="100" autocomplete="organization-title" required>
        <label for="salary">Annual salary</label>
        <input type="number" min="0" max="999999999.99" step="0.01" name="salary" id="salary" value="{{ values.get('salary', employee.salary) }}" inputmode="decimal" required>
        <div class="form-actions"><button class="button" type="submit">Save changes</button><a href="{{ url_for('view_employees') }}">Cancel</a></div>
    </form>
</section>
{% endblock %}
