<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A focused Flask and SQLAlchemy employee data application.">
    <title>{% block title %}PeopleBase{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{{ url_for('home') }}">People<span>Base</span></a>
        <nav aria-label="Primary navigation">
            <a href="{{ url_for('view_employees') }}">Directory</a>
            <a class="button button-small" href="{{ url_for('add_employee') }}">Add employee</a>
        </nav>
    </header>
    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-stack" aria-live="polite">
                    {% for category, message in messages %}
                        <p class="flash flash-{{ category }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <footer>
        <span>Flask + SQLAlchemy</span>
        <span>Patrick King</span>
    </footer>
</body>
</html>
